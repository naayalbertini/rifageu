<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin Rifa AMVOX</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#000,#0a0a0a);
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#00ff99;
}

.top{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

.top span{
  font-size:18px;
}

button{
  background:#00ff99;
  border:none;
  color:#000;
  padding:8px 14px;
  font-weight:bold;
  cursor:pointer;
  border-radius:6px;
  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}

table{
  width:100%;
  border-collapse:collapse;
  background:#111;
}

th{
  background:#000;
  padding:10px;
}

td{
  padding:10px;
  border-bottom:1px solid #333;
}

tr:hover{background:#191919}

.pago{
  color:lime;
  font-weight:bold;
}

.pendente{
  color:orange;
  font-weight:bold;
}

a{color:#00ff99;text-decoration:none;}

@media(max-width:700px){
  table,thead,tbody,th,td,tr{
    display:block;
  }

  tr{
    border:1px solid #333;
    margin-bottom:10px;
    padding:10px;
  }

  td{
    border:none;
    padding:5px;
  }

  th{display:none;}
}
</style>

</head>
<body>

<div class="container">

<h1>📊 Painel Administrativo — Rifa AMVOX</h1>

<div class="top">
  <span id="total">💰 Total arrecadado: R$ 0</span>
  <div>
    <button onclick="exportarPDF()">📄 PDF</button>
    <button onclick="exportarExcel()">📊 Excel</button>
  </div>
</div>

<table>
<thead>
<tr>
<th>Número</th>
<th>Nome</th>
<th>WhatsApp</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, deleteDoc }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXaehtWsEX75OY1Xat6PdMBUo8QBLcrBs",
  authDomain: "rifageu.firebaseapp.com",
  projectId: "rifageu",
  storageBucket: "rifageu.firebasestorage.app",
  messagingSenderId: "681099630172",
  appId: "1:681099630172:web:db0b64ac41d969a93a3899"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let total = 0;
const lista = document.getElementById("lista");
const totalSpan = document.getElementById("total");

async function carregarAdmin(){

  const dados = await getDocs(collection(db,"rifas"));
  lista.innerHTML = "";
  total = 0;

  dados.forEach(item=>{

    const d = item.data();
    const tr = document.createElement("tr");

    if(d.pago) total += 10;

    tr.innerHTML = `
      <td>${d.numero}</td>
      <td>${d.nome}</td>
      <td>
        <a target="_blank" href="https://wa.me/55${d.whatsapp}">
        📲 Abrir
        </a>
      </td>
      <td class="${d.pago?'pago':'pendente'}">${d.pago?'Pago':'Pendente'}</td>
      <td>
        <button onclick="confirmar('${item.id}')">✔</button>
        <button onclick="excluir('${item.id}')">🗑</button>
      </td>
    `;

    lista.appendChild(tr);
  });

  totalSpan.innerHTML = `💰 Total arrecadado: R$ ${total},00`;
}

carregarAdmin();

// ✅ CONFIRMAR PAGAMENTO
window.confirmar = async function(id){
  const ref = doc(db,"rifas",id);
  await updateDoc(ref,{pago:true});
  carregarAdmin();
}

// ✅ EXCLUIR
window.excluir = async function(id){
  if(confirm("Excluir essa reserva?")){
    await deleteDoc(doc(db,"rifas",id));
    carregarAdmin();
  }
}

// ✅ PDF
window.exportarPDF = function(){
  window.print();
}

// ✅ EXCEL
window.exportarExcel = function(){

  let csv = "Numero,Nome,WhatsApp,Status\n";

  document.querySelectorAll("tbody tr").forEach(l=>{
    const c = l.querySelectorAll("td");
    csv += `${c[0].innerText},${c[1].innerText},${c[2].innerText},${c[3].innerText}\n`;
  });

  const blob = new Blob([csv],{type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "rifa.csv";
  a.click();
}

</script>

</body>
</html>
