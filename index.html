<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rifa Bolsa + Perfume</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}
.container{
  max-width:500px;
  margin:auto;
  background:white;
  padding:15px;
}
header{
  text-align:center;
}
.produto{
  width:100%;
  border-radius:10px;
}
h1{
  font-size:20px;
}
.valor{
  background:#ff4081;
  color:white;
  padding:8px;
  border-radius:5px;
  margin-top:10px;
}
#numeros{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:5px;
  margin-top:15px;
}
.numero{
  padding:10px;
  text-align:center;
  background:#eee;
  cursor:pointer;
  border-radius:5px;
}
.numero.selecionado{
  background:#4caf50;
  color:white;
}
.numero.ocupado{
  background:#999;
  color:white;
  pointer-events:none;
}
.formulario{
  margin-top:15px;
}
input{
  width:100%;
  padding:10px;
  margin-top:5px;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#4caf50;
  color:white;
  border:none;
}
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.modalBox{
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<header>
  <!-- TROQUE A IMAGEM AQUI -->
  <img src="img/image.png" class="produto">

  <h1>🎁 RIFA ESPECIAL</h1>
  <h2>Bolsa + Perfume Floratta 💖</h2>

  <p>
    Concorra a uma linda bolsa + perfume Floratta Love Flower 🌸<br>
    Um combo perfeito para presentear ou usar!
  </p>

  <div class="valor">R$ 10 por número</div>
</header>

<div id="numeros"></div>

<div class="formulario">
  <input id="nome" placeholder="Nome completo">
  <input id="whatsapp" placeholder="WhatsApp com DDD">
  <div id="lista"></div>
  <button onclick="comprar()">Reservar números</button>
</div>

<!-- MODAL PIX -->
<div class="modal" id="modalPix">
  <div class="modalBox">
    <span onclick="fecharPix()">✖</span>
    <div id="pixBox"></div>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJETO"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const numerosDiv = document.getElementById("numeros");
const pixBox = document.getElementById("pixBox");

let selecionados = [];
let vendidos = [];

async function carregarNumeros(){
  const snapshot = await getDocs(collection(db,"rifas"));
  snapshot.forEach(doc=> vendidos.push(doc.data().numero));

  for(let i=1;i<=100;i++){
    const div = document.createElement("div");
    div.className = "numero";
    div.innerText = i;

    if(vendidos.includes(i)) div.classList.add("ocupado");

    div.onclick = ()=> selecionarNumero(i,div);
    numerosDiv.appendChild(div);
  }
}
carregarNumeros();

function selecionarNumero(numero,el){
  if(el.classList.contains("ocupado")) return;

  if(selecionados.includes(numero)){
    selecionados = selecionados.filter(n=>n!==numero);
    el.classList.remove("selecionado");
  }else{
    selecionados.push(numero);
    el.classList.add("selecionado");
  }
  atualizarResumo();
}

function atualizarResumo(){
  const total = selecionados.length*10;
  document.getElementById("lista").innerHTML = `
    <strong>Números:</strong> ${selecionados.join(", ") || "nenhum"}<br>
    <strong>Total:</strong> R$ ${total},00
  `;
}

window.comprar = async function(){
  const nome = document.getElementById("nome").value.trim();
  const whatsapp = document.getElementById("whatsapp").value.trim();

  if(!nome || !whatsapp || selecionados.length === 0){
    alert("Preencha e selecione os números");
    return;
  }

  for(const numero of selecionados){
    await addDoc(collection(db,"rifas"),{
      nome, whatsapp, numero, pago:false, data:new Date()
    });
  }

  const total = selecionados.length*10;
  pixBox.innerHTML = `
    <h3>✅ Reserva realizada!</h3>
    <p><strong>Números:</strong> ${selecionados.join(", ")}</p>
    <p><strong>Total:</strong> R$ ${total},00</p>
    <p>PIX:</p>
    <div id="pix">71999326353</div>
    <button onclick="copiarPix()">Copiar PIX</button>
  `;

  document.getElementById("modalPix").style.display = "flex";
}

window.copiarPix = function(){
  const pix = document.getElementById("pix").innerText;
  navigator.clipboard.writeText(pix);
  alert("PIX copiado!");
}

window.fecharPix = function(){
  document.getElementById("modalPix").style.display="none";
}
</script>

</body>
</html>
